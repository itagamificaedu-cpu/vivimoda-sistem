<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ConfecSystem</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e2a3a 0%, #2d4a6b 50%, #1a3a5c 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
    }
    .login-header {
      background: linear-gradient(135deg, #1e2a3a, #2d4a6b);
      color: #fff;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }
    .login-header .icon-box {
      width: 72px; height: 72px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .login-body { padding: 2rem; }
    .btn-login {
      background: linear-gradient(135deg, #1e2a3a, #2d4a6b);
      color: #fff;
      border: none;
      padding: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .btn-login:hover { opacity: 0.9; color: #fff; }
    .form-floating label { color: #6c757d; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="icon-box"><i class="bi bi-shop"></i></div>
      <h4 class="mb-1 fw-bold">ConfecSystem</h4>
      <p class="mb-0 opacity-75 small">Sistema de Gestão para Confecção</p>
    </div>
    <div class="login-body">
      {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %} py-2 small">
          <i class="bi bi-exclamation-triangle me-1"></i>{{ msg }}
        </div>
        {% endfor %}
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="id_username" name="username"
                 placeholder="Usuário" autofocus required>
          <label for="id_username"><i class="bi bi-person me-1"></i>Usuário</label>
        </div>
        <div class="form-floating mb-4">
          <input type="password" class="form-control" id="id_password" name="password"
                 placeholder="Senha" required>
          <label for="id_password"><i class="bi bi-lock me-1"></i>Senha</label>
        </div>
        <button type="submit" class="btn btn-login w-100 rounded-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no Sistema
        </button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        <i class="bi bi-shield-check me-1"></i>Acesso restrito a usuários autorizados
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

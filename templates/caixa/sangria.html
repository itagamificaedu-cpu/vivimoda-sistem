{% extends 'base.html' %}

{% block titulo %}Sangria de Caixa{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'caixa:index' %}">Caixa</a></li>
                <li class="breadcrumb-item"><a href="{% url 'caixa:sessao' sessao.pk %}">Sessão</a></li>
                <li class="breadcrumb-item active">Sangria</li>
            </ol>
        </nav>
        <div class="card border-warning">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0"><i class="bi bi-dash-circle me-2"></i>Sangria de Caixa</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    Saldo atual em caixa: <strong>R$ {{ sessao.saldo_esperado|floatformat:2 }}</strong>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Valor da Sangria *</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text">R$</span>
                            <input type="number" name="valor" class="form-control"
                                   step="0.01" min="0.01" required placeholder="0,00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Motivo / Destino *</label>
                        <textarea name="descricao" class="form-control" rows="3" required
                                  placeholder="Descreva o motivo da sangria..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Senha Gerencial *</label>
                        <input type="password" name="senha_gerencial" class="form-control"
                               required placeholder="Senha do gerente">
                        <small class="text-muted">Sangria requer autorização gerencial.</small>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning flex-fill">
                            <i class="bi bi-dash-circle me-1"></i>Confirmar Sangria
                        </button>
                        <a href="{% url 'caixa:sessao' sessao.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

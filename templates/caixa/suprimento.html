{% extends 'base.html' %}

{% block titulo %}Suprimento de Caixa{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'caixa:index' %}">Caixa</a></li>
                <li class="breadcrumb-item"><a href="{% url 'caixa:sessao' sessao.pk %}">Sessão</a></li>
                <li class="breadcrumb-item active">Suprimento</li>
            </ol>
        </nav>
        <div class="card border-success">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Suprimento de Caixa</h5>
            </div>
            <div class="card-body">
                <p class="text-muted">Utilize para adicionar dinheiro ao caixa (troco, reposição de fundo, etc.).</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Valor *</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text">R$</span>
                            <input type="number" name="valor" class="form-control"
                                   step="0.01" min="0.01" required placeholder="0,00">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Motivo / Origem *</label>
                        <textarea name="descricao" class="form-control" rows="3" required
                                  placeholder="Descreva a origem do suprimento..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-fill">
                            <i class="bi bi-plus-circle me-1"></i>Confirmar Suprimento
                        </button>
                        <a href="{% url 'caixa:sessao' sessao.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
